name: Scrape FIUSAC Horarios

on:
  schedule:
    # Cada lunes a las 06:00 UTC (medianoche en Guatemala)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Permite ejecución manual desde la UI de GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Necesario para hacer push de los cambios

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scraper.mjs

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pemtree-react/public/json/horarios/
          if git diff --staged --quiet; then
            echo "No hay cambios en los horarios"
          else
            git commit -m "chore: actualizar horarios FIUSAC [skip ci]"
            git push
          fi
