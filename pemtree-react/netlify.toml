[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[[headers]]
  for = "/json/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    Content-Type = "application/json; charset=utf-8"

[[headers]]
  for = "/pensum_color/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    Content-Type = "application/json; charset=utf-8"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    Content-Type = "application/json; charset=utf-8"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200