[build]
  # Utilizamos pnpm para ejecutar el script de construcción.
  command = "pnpm run build"

  # El directorio generado tras la compilación.
  # (Suele ser "dist" para Vite/Vue/Angular o "build" para Create React App/Next.js).
  publish = "dist"

# Opcional pero muy recomendado: Variables de entorno para fijar las versiones.
[build.environment]
  # Descomenta estas líneas y ajusta las versiones si quieres asegurar 
  # que Netlify use exactamente las mismas que tienes en tu computadora.
  # NODE_VERSION = "20"
  # PNPM_VERSION = "8"

# Redirección necesaria si tu proyecto es una SPA (Single Page Application).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
